# yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json
version: 2

updates:
  # Rotates the commit-SHA pins in .github/workflows, restoring the upgrade channel that pinning closes.
  # Every bump is grouped into one pull request per run; the cadence is one review a month rather than one per action.
  - package-ecosystem: github-actions
    directory: /
    # Naming labels explicitly stops dependabot applying its defaults.
    # Any labels listed here and not declared in .github/labels.yaml would be deleted by the next sync.
    labels:
      - ci
      - dependencies
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - '*'
