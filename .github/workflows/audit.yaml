# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Dependency audit

on:
  pull_request:
    branches:
      - main
      - next

  # Daily schedule — adjust cron expression per repo if a different cadence is desired.
  schedule:
    - cron: '0 8 * * *'

  workflow_dispatch: {}

# Permissions are declared by the reusable workflow itself; GitHub Actions does
# not propagate caller permissions to jobs defined in a reusable workflow.
jobs:
  audit:
    uses: williamthorsen/node-monorepo-tools/.github/workflows/audit.reusable.yaml@audit-workflow-v1
