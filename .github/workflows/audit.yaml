# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Dependency audit

on:
  pull_request:
    branches:
      - main
      - next

  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'

  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # -- PR audit: prod dependencies only, non-blocking with acknowledgment -----
  pr-audit:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run prod audit
        id: audit
        run: pnpm exec nmr audit:prod 2>&1 | tee audit-output.txt
        continue-on-error: true

      - name: Build PR comment
        id: comment
        run: |
          if [ "${{ steps.audit.outcome }}" = "success" ]; then
            {
              echo 'body<<AUDIT_EOF'
              echo '## Dependency audit'
              echo ''
              echo 'Production dependency audit passed.'
              echo 'AUDIT_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<AUDIT_EOF'
              echo '## Dependency audit'
              echo ''
              echo 'Production dependency audit found issues:'
              echo ''
              echo '```'
              cat audit-output.txt
              echo '```'
              echo ''
              echo 'If these failures have been reviewed, add the following to the PR description:'
              echo ''
              echo '```markdown'
              echo '- [x] Audit failures have been reviewed'
              echo '```'
              echo 'AUDIT_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '## Dependency audit'

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: ${{ steps.comment.outputs.body }}

      - name: Check acknowledgment
        if: steps.audit.outcome == 'failure'
        run: |
          PR_BODY=$(gh pr view "${{ github.event.pull_request.number }}" --json body --jq .body)
          if echo "$PR_BODY" | grep -qF '- [x] Audit failures have been reviewed'; then
            echo "Audit failures acknowledged via PR checkbox."
          else
            echo "::error::Audit failed and has not been acknowledged. Add '- [x] Audit failures have been reviewed' to the PR description."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # -- Scheduled audit: prod + dev, updates standing issue --------------------
  scheduled-audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run prod audit
        id: audit-prod
        run: pnpm exec nmr audit:prod 2>&1 | tee audit-prod-output.txt
        continue-on-error: true

      - name: Run dev audit
        id: audit-dev
        run: pnpm exec nmr audit:dev 2>&1 | tee audit-dev-output.txt
        continue-on-error: true

      - name: Build issue body
        id: issue
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo 'body<<AUDIT_EOF'
            echo "## Dependency audit results"
            echo ""
            echo "Last updated: ${TIMESTAMP}"
            echo ""
            echo "### Production dependencies"
            echo ""
            if [ "${{ steps.audit-prod.outcome }}" = "success" ]; then
              echo "Passed."
            else
              echo '```'
              cat audit-prod-output.txt
              echo '```'
            fi
            echo ""
            echo "### Development dependencies"
            echo ""
            if [ "${{ steps.audit-dev.outcome }}" = "success" ]; then
              echo "Passed."
            else
              echo '```'
              cat audit-dev-output.txt
              echo '```'
            fi
            echo 'AUDIT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Ensure audit-status label exists
        run: |
          gh label create audit-status --color "0075ca" --description "Tracks dependency audit status" || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Find or create standing issue
        id: find-issue
        run: |
          ISSUE_NUMBER=$(gh issue list --label audit-status --state open --json number --jq '.[0].number // empty')
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_NUMBER=$(gh issue create \
              --title "Dependency audit status" \
              --label "audit-status" \
              --body "Awaiting first audit run." | grep -oE '[0-9]+$')
          fi
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::error::Failed to create or find audit-status issue."
            exit 1
          fi
          echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update issue body
        run: |
          gh issue edit "${{ steps.find-issue.outputs.number }}" --body "$ISSUE_BODY"
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
