# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish

# Reusable publish workflow for projects using @williamthorsen/release-kit.
#
# Triggered by tag pushes. Runs `pnpm install` before publishing so consumer
# packages with build-time `prepare` hooks have their devDependencies on disk,
# then invokes release-kit with OIDC-based npm authentication via `npx`, which
# prefers the consumer's workspace-linked release-kit over a registry fetch.
# Pass `provenance: true` to enable npm provenance attestations (requires a public repo).
# When running in the `williamthorsen/node-monorepo-tools` repo itself (checked
# via `github.repository`), release-kit is additionally built from source so
# the workspace-linked binary is ready before `npx` invokes it.
# The calling workflow must grant `id-token: write` and `contents: read` permissions.
#
# Usage:
#   jobs:
#     publish:
#       uses: williamthorsen/node-monorepo-tools/.github/workflows/publish.reusable.yaml@workflow/publish-v1

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use for publishing'
        required: false
        type: string
        default: '24'
      provenance:
        description: 'Generate npm provenance attestations (requires a public repo)'
        required: false
        type: boolean
        default: false
      tags:
        description: 'Comma-separated list of full tag names to publish (leave empty to publish every release tag on HEAD)'
        required: false
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Always install dependencies so that consumer packages with a `prepare`
      # lifecycle hook (e.g., a build step) can run during `npm publish`.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build release-kit from source to avoid bootstrap problems when
      # publishing a version that introduces new CLI flags.
      - name: Build release-kit from source
        if: ${{ github.repository == 'williamthorsen/node-monorepo-tools' }}
        run: pnpm --filter @williamthorsen/release-kit... run prepare

      - name: Publish
        run: |
          npx --yes @williamthorsen/release-kit publish \
            ${{ inputs.provenance && '--provenance' || '' }} \
            ${{ inputs.tags != '' && format('--tags="{0}"', inputs.tags) || '' }}
