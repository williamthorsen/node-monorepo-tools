# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  workflow_dispatch:
    inputs:
      only:
        description: 'Components to release (comma-separated, leave empty for all)'
        required: false
        type: string
      bump:
        description: 'Override version bump type (leave empty to auto-detect from commits)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
      force:
        description: 'Bypass "no commits since last tag" check (requires bump)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: read

jobs:
  release:
    uses: williamthorsen/.github/.github/workflows/release-pnpm.yaml@v3
    with:
      only: ${{ inputs.only }}
      bump: ${{ inputs.bump }}
      force: ${{ inputs.force }}
