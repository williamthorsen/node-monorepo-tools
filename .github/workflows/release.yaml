# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  workflow_dispatch:
    inputs:
      only:
        description: 'Components to release (comma-separated, leave empty for all)'
        required: false
        type: string
      bump:
        description: 'Override version bump type (leave empty to auto-detect from commits)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
      force:
        description: 'Bypass "no commits since last tag" check (requires bump)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: read

jobs:
  release:
    uses: williamthorsen/node-monorepo-tools/.github/workflows/release-workflow.yaml@release-workflow-v1
    with:
      only: ${{ inputs.only }}
      bump: ${{ inputs.bump }}
      # TODO: The reusable workflow (release-pnpm.yaml@v3) does not yet accept `force`.
      # After updating williamthorsen/.github to declare and forward this input,
      # add `force: ${{ inputs.force }}` here.
