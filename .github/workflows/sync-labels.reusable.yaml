# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 'Reusable: Sync labels'

# Reusable label-sync workflow for repos consuming release-kit's `sync-labels`.
#
# Applies `.github/labels.yaml` to the repository's labels, deleting any label the
# file does not declare. Pass `dry-run: true` to compute and log the diff without
# applying it — the job log then carries the full set of creates, edits, renames,
# and deletions, including deletions of labels absent from the file.
#
# Usage:
#   jobs:
#     sync:
#       uses: williamthorsen/node-monorepo-tools/.github/workflows/sync-labels.reusable.yaml@workflow/sync-labels-v1
#       with:
#         dry-run: true

on:
  workflow_call:
    inputs:
      dry-run:
        description: Compute and log the label diff without applying it
        type: boolean
        required: false
        default: false

# No workflow-level `permissions` block, deliberately: a called workflow can only
# lower the caller's grant, never raise it, so a hard-declared `issues: write` would
# make GitHub reject any caller that grants only `issues: read` — which is exactly
# the token a dry-run check should hold. The caller declares what it needs; see the
# `audit.yaml` precedent for the caller-side contract.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # Pinned by commit SHA: the `v2` tag is movable, and the action's unreleased `main`
      # already swaps the vendored engine for `@endbug/github-label-sync@3`, whose delete
      # and rename semantics are not the ones reasoned about here. Rotated by dependabot.
      - name: Sync labels
        uses: EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a # v2.3.3 — vendors github-label-sync@2.3.1
        with:
          config-file: .github/labels.yaml
          delete-other-labels: true
          dry-run: ${{ inputs.dry-run }}
