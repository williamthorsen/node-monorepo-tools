# Common label definitions for GitHub repositories.
# Compatible with EndBug/label-sync format.

# Main categories
- name: breaking
  color: b60205
  description: Breaking API change or removal of functionality
- name: bug
  color: d73a4a
  description: "Something isn't working"
- name: deprecation
  color: fbca04
  description: Marks functionality for future removal
- name: documentation
  color: a2eeef
  description: Improvements or additions to documentation
- name: feature
  color: '0075ca'
  description: Added or improved external functionality
- name: fix
  color: d73a4a
  description: Fixes a bug
- name: performance
  color: '0075ca'
  description: Improves performance without changing behavior
- name: security
  color: b60205
  description: Security vulnerability or hardening
- name: spike
  color: '000000'
  description: Investigation

# Guidance
- name: good first issue
  color: 90ee90
  description: Good for newcomers
- name: help wanted
  color: '008672'
  description: Please help if you can
- name: question
  color: fbca04
  description: Further information is needed

# Refactoring
- name: ci
  color: edc287
  description: CI/CD tooling & configuration
- name: dependencies
  color: edc287
  description: Change to dependencies
- name: internal
  color: 1d76db
  description: Internal change without external impact
- name: refactoring
  color: edc287
  description: Improvement to code without change in functionality
- name: tests
  color: edc287
  description: Tests
- name: tooling
  color: edc287
  description: Development tools

# Priority
- name: 'priority:critical'
  color: b60205
  description: Demands immediate attention
- name: 'priority:high'
  color: d93f0b
  description: Address soon
- name: 'priority:medium'
  color: fbca04
  description: No rush but don't forget
- name: 'priority:low'
  color: cfd3d7
  description: Get to it eventually

# Value
- name: 'value:must-have'
  color: 7057ff
  description: Essential for the application to fulfill its purpose
- name: 'value:should-have'
  color: 8d83fc
  description: Important but the application is usable without it
- name: 'value:nice-to-have'
  color: a8b2f8
  description: A nice-to-have enhancement
- name: 'value:questionable'
  color: c5def5
  description: Decision needed on whether this would add sufficient value

# Triage
- name: duplicate
  color: cfd3d7
  description: Duplicates another issue or pull request
- name: wontfix
  color: ffffff
  description: This will not be worked on
